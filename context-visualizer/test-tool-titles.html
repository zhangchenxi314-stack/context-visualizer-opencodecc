:root{
  --bg:#0e1117; --bg-2:#141925; --card:#161b27;
  --ink:#e7ecf4; --ink-soft:#9aa6ba; --ink-faint:#6b778c;
  --line:#222a39; --line-soft:#1b2230;
  --accent:#7c8bff; --accent-soft:#7c8bff33;
  --ok:#34d399; --warn:#f0b252; --idle:#48536a;
  --shadow:0 1px 2px #0006, 0 10px 30px #0007;
  --night:#0a0d14;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden}
body{
  background:var(--bg); color:var(--ink);
  font:13px/1.45 system-ui,-apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
  -webkit-font-smoothing:antialiased; user-select:none;
}
#stage{position:absolute; inset:0; overflow:hidden;
  background:
    radial-gradient(1200px 600px at 18% 8%, #151b2a 0%, transparent 60%),
    radial-gradient(1000px 700px at 88% 96%, #1a1530 0%, transparent 55%),
    var(--bg);
  cursor:grab;}
#stage.panning{cursor:grabbing}
svg{display:block; width:100%; height:100%}
.ribbon{transition:opacity .15s}
.ribbon.dim{opacity:.12}
.center{fill:none; stroke-linecap:round}
.mk{cursor:pointer}
.mk .hit{fill:transparent; stroke:transparent}
.lbl{fill:var(--ink); font-weight:700; paint-order:stroke; stroke:var(--bg); stroke-width:4px; stroke-linejoin:round}
.lbl-sub{fill:var(--ink-faint); font-weight:600; font-size:10px; paint-order:stroke; stroke:var(--bg); stroke-width:3.5px}
.axislab{fill:var(--ink-faint); font-size:11px; font-weight:600}
.daylab{fill:var(--ink-soft); font-size:12px; font-weight:700; letter-spacing:.4px}
.gridv{stroke:var(--line-soft); stroke-width:1; stroke-dasharray:2 6}
.nightband{fill:var(--night); opacity:.55}
.nightlab{fill:var(--ink-faint); font-size:10px; font-weight:600}

/* ---- chrome ---- */
.panel{position:absolute; background:rgba(20,25,37,.86); backdrop-filter:blur(10px);
  border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow)}

#hdr h1{margin:0 0 3px; font-size:15px; letter-spacing:.2px; display:flex; align-items:center; gap:8px}

.leg-row > svg{flex:0 0 34px; width:34px; height:14px}
.leg-row span{flex:1 1 auto; min-width:0; white-space:normal}
#legShapes{flex-wrap:wrap; gap:10px 14px; align-items:flex-start}
#legShapes > div{display:flex; align-items:center; gap:6px; color:var(--ink-soft); font-size:10.5px}
#legShapes svg{flex:0 0 20px; width:20px; height:20px}
.leg-sec{margin-top:11px; padding-top:9px; border-top:1px solid var(--line)}
.leg-row b{color:var(--ink); font-weight:600}

#controls{bottom:16px; left:16px; padding:7px; display:flex; gap:6px}
.btn{background:var(--card); border:1px solid var(--line); color:var(--ink-soft);
  border-radius:9px; padding:7px 11px; font:600 12px inherit; cursor:pointer; display:flex; align-items:center; gap:6px}
.btn:hover{color:var(--ink); border-color:var(--accent)}
.btn.on{color:var(--accent); border-color:var(--accent); background:var(--accent-soft)}

.cov-dot{width:8px;height:8px;border-radius:50%;background:var(--idle);display:inline-block;box-shadow:0 0 7px currentColor}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);display:inline-block;box-shadow:0 0 8px var(--ok)}
#bLive:not(.on) .live-dot{background:var(--idle);box-shadow:none}
#bLive.on .live-dot{animation:livep 1.8s ease-in-out infinite}
@keyframes livep{0%,100%{opacity:1}50%{opacity:.25}}
#importPanel{position:absolute; left:16px; bottom:64px; width:380px; max-height:60vh; overflow:auto; padding:13px 15px; display:none; z-index:42}
#importPanel.show{display:block}

   原始日志 → [蒸馏] → events.json → [本渲染器]。pts(投入曲线)不进
   契约,由事件密度派生(§3b)。provenance / 将来 live 都坐在 events 上。
   ============================================================ */
let AGENTS=[], SESSIONS=[], THREAD_DEFS=[], TYPES={}, EVENTS=[], COVERAGE=null;
let THREADS=[], MILES=[];        // 由 events 派生的视图模型(渲染器吃的形状)
let SRC_MAP={};                  // session id -> jsonl 文件名(provenance 路径展示)

/* ============================================================
   2) 时间轴 —— 压缩长空闲(夜间),保序保大致比例
   ============================================================ */
// ts 容错:已带 Z / ±时区则不再追加 Z(修复旧版对带 Z 串双加的 bug);兼容毫秒数字时间戳(OpenCode)
const T = s => typeof s === "number" ? s : new Date(/Z|[+-]\d\d:?\d\d$/.test(s) ? s : s+"Z").getTime();
const CAP = 22*60*1000;      // 任何间隔最多算 22min
const FLOOR = 75*1000;       // 任何间隔至少算 75s(让密集 burst 也分得开)
const NIGHT = 50*60*1000;    // 原始间隔 > 50min 画"压缩带"
let allT=[], bp=[], nightSpans=[], compTotal=0;

function buildTimeline(){      // 从所有 event 的 ts 建压缩时间轴
  allT = [...new Set(EVENTS.map(e=>T(e.ts)))].sort((a,b)=>a-b);
  bp = [{raw:allT[0], comp:0}]; nightSpans=[];
  for(let i=1;i<allT.length;i++){
    const raw = allT[i]-allT[i-1];
    const eff = Math.min(Math.max(raw,FLOOR),CAP);
    const comp = bp[i-1].comp + eff;
    if(raw>NIGHT) nightSpans.push({from:bp[i-1].comp, to:comp, ms:raw});
    bp.push({raw:allT[i], comp});
  }
  compTotal = bp[bp.length-1].comp;
  PX_PER_COMP = 1720 / compTotal;
  contentW = PAD_L + compTotal*PX_PER_COMP + PAD_R;
}

function compAt(t){ // 原始 ms -> 压缩坐标
  if(t<=bp[0].raw) return bp[0].comp;
  if(t>=bp[bp.length-1].raw) return bp[bp.length-1].comp;
  for(let i=1;i<bp.length;i++){
    if(t<=bp[i].raw){
      const a=bp[i-1], b=bp[i];
      const f=(t-a.raw)/(b.raw-a.raw||1);
      return a.comp + f*(b.comp-a.comp);
    }
  }
  return compTotal;
}

/* ============================================================
   3) 布局
   ============================================================ */
const PAD_L=160, PAD_R=170, PAD_T=120, LANE_GAP=66;
let PX_PER_COMP=1, contentW=0, order=[], TH={};

function laneY(id){ return PAD_T + order.indexOf(id)*LANE_GAP; }
const tToX = t => PAD_L + compAt(t)*PX_PER_COMP;
const wToPx = w => 3.5 + w*24;          // 投入 -> 像素粗细

// agent → 该 agent 占用的泳道索引范围(用于背景带 / 分组约束)
function agentLaneRange(agentId){
  const idx = order.map((id,i)=>({id,i})).filter(o=>TH[o.id] && TH[o.id].agent===agentId).map(o=>o.i);
  return idx.length ? {min:Math.min(...idx), max:Math.max(...idx)} : null;
}

/* ============================================================
   3b) 由 events 派生 {THREADS, MILES} —— pts 按事件密度算(停止手写)
   ============================================================ */
function deriveViews(){
  const BW = compTotal/18 || 1;                 // 核密度带宽(压缩坐标)
  const perThread = THREAD_DEFS.map(def=>{
    const evs = EVENTS.filter(e=>e.thread===def.id).sort((a,b)=>T(a.ts)-T(b.ts));
    return { def, evs, cs: evs.map(e=>compAt(T(e.ts))) };
  }).filter(o=>o.evs.length>0);
  let gmax=1e-9;
  perThread.forEach(o=>{                         // 每事件的局部密度 = 投入
    o.raw = o.cs.map(ci => o.cs.reduce((s,cj)=> s + Math.exp(-(((ci-cj)/BW)**2)), 0));
    o.raw.forEach(r=>{ if(r>gmax) gmax=r; });
  });
  const threads = perThread.map(o=>{
    const pts = o.evs.map((e,i)=>[e.ts, Math.max(.08, Math.min(1, o.raw[i]/gmax))]);
    const lastT = T(o.evs[o.evs.length-1].ts);
    const lastType = o.evs[o.evs.length-1].type;
    const fadeEnd = o.def.fade || lastType==="abandon" || (allT[allT.length-1]-lastT > 90*60*1000);
    if(fadeEnd) pts.push([ new Date(lastT + 8*60*1000).toISOString(),
                           Math.max(.05, pts[pts.length-1][1]*0.18) ]);  // 细尾点 = 淡出/废弃
    return { id:o.def.id, name:o.def.name, sub:o.evs.length+" 事件", color:o.def.color,
      agent:o.def.agent, parent:o.def.parent, fade:!!o.def.fade, glow:!!o.def.glow, pts };
  });
  // marker 选择(防糊):结构类型必留;量产类型(artifact/finding/interrupt)按最小间隔节流
  const STRUCT = new Set(["question","decision","pivot","abandon","verify","handoff"]);
  const MIN_GAP = (compTotal/26) || 1;
  const miles=[];
  threads.forEach(t=>{
    const evs = EVENTS.filter(e=>e.thread===t.id).sort((a,b)=>T(a.ts)-T(b.ts));
    let lastKept=-1e9;
    evs.forEach(e=>{
      const c = compAt(T(e.ts));
      if(STRUCT.has(e.type) || e.handoff_to || e.handoff_from || (c-lastKept >= MIN_GAP)){
        lastKept=c;
        miles.push({ th:e.thread, t:e.ts, line:e.line, type:e.type, lbl:e.title, ex:e.summary,
          excerpt:e.excerpt||e.summary, id:e.id, agent:e.agent, session:e.session,
          handoff_to:e.handoff_to, handoff_from:e.handoff_from });
      }
    });
  });
  return { threads, milestones: miles };
}

/* ============================================================
   3c) 载入 events.json → 派生 → 渲染
   ============================================================ */
function applyDoc(d, doFit){
  AGENTS=d.agents; SESSIONS=d.sessions; THREAD_DEFS=d.threadDefs; TYPES=d.typeDefs; EVENTS=d.events; COVERAGE=d.coverage||null;
  SRC_MAP = Object.fromEntries(SESSIONS.map(s=>[s.id, s.file]));
  buildTimeline();
  const v = deriveViews(); THREADS=v.threads; MILES=v.milestones;
  order = THREADS.map(t=>t.id);                  // threadDefs 顺序 = 已按 agent 分组(每 agent 一条带)
  TH = Object.fromEntries(THREADS.map(t=>[t.id,t]));
  contentH = PAD_T + THREADS.length*LANE_GAP + 60;
  const span = `${fmtTime(allT[0])} → ${fmtTime(allT[allT.length-1])}`;
  const ht=document.getElementById("hdrTitle");
  if(ht) ht.textContent = (d.meta&&d.meta.title) || `${AGENTS.length} agent · ${SESSIONS.length} 会话 Storyline`;
  const hm=document.getElementById("hdrMeta");
  if(hm) hm.innerHTML = `<b>${AGENTS.length}</b> agent · <b>${SESSIONS.length}</b> 会话 · <b>${THREADS.length}</b> 线程 · <b>${EVENTS.length}</b> 事件 · ${span}`;
  buildLegend(); buildCoverageChip(); render();
  if(doFit) fitView();   // 首次适配;live 更新时保留当前平移/缩放,让新段"往右长出"
}
// live 签名:事件数 + 最新事件 + 留账总数 —— 变了才重渲染
const dataSig = d => `${d.events.length}:${(d.events[d.events.length-1]||{}).id||""}:${(d.coverage&&d.coverage.totals&&d.coverage.totals.turns)||0}`;
let liveSig="", LIVE_ON=false, LIVE_MS=5000, liveTimer=null, prevEventCount=0;

async function loadData(){
  let d;
  try { d = window.__STORYLINE_DATA__; }
  catch(err){
    document.getElementById("hdr").innerHTML =
      "<h1>events.json 载入失败</h1><p>请经服务器打开(<code>node serve.js</code> 后访问 http://localhost:8123),file:// 直开无法 fetch 本地 json。</p>";
    return;
  }
  liveSig=dataSig(d); prevEventCount=d.events.length;
  applyDoc(d, true);
  startLive();
}
async function pollLive(){
  if(!LIVE_ON) return;
  try{
    const d = window.__STORYLINE_DATA__;
    const sig=dataSig(d);
    if(sig!==liveSig){
      const grew = d.events.length - prevEventCount;
      liveSig=sig; prevEventCount=d.events.length;
      applyDoc(d, false);                 // 保留视图,往右长
      flashLive(grew);
    }
  }catch(e){ /* server 关 / 暂不可达:静默,下次再试 */ }
}
function startLive(){ if(liveTimer) clearInterval(liveTimer); if(LIVE_ON) liveTimer=setInterval(pollLive, LIVE_MS); }
function flashLive(grew){
  const t=document.getElementById("toast");
  t.textContent = grew>0 ? `▸ storyline 长出 ${grew} 段` : "▸ storyline 更新";
  t.classList.add("show"); clearTimeout(flashLive._t); flashLive._t=setTimeout(()=>t.classList.remove("show"),1800);
}

// 线程在某时刻的中心 y(线性插值控制点;含分叉出生点)
function buildCenterline(th){
  const base = laneY(th.id);
  const pts = th.pts.map((p,i)=>({ x:tToX(T(p[0])), y:base, w:wToPx(p[1]), t:T(p[0]) }));
  // 分叉:首点从父线程当时的 y 长出,粗细收窄
  if(th.parent){
    const py = laneY(th.parent);
    pts[0] = {...pts[0], y:py, w:Math.min(pts[0].w,6)};
    // 插一个过渡点,让它平滑弯到自己泳道
    const x0=pts[0].x, x1=pts[1]?pts[1].x:x0+40;
    pts.splice(1,0,{ x:x0+(x1-x0)*0.45, y:(py+base)/2, w:(pts[0].w+pts[1].w)/2, t:pts[0].t });
  }
  return pts;
}

// Catmull-Rom 采样 -> 稠密 {x,y,w}
function sample(pts, step=18){
  if(pts.length<2) return pts.slice();
  const P=[pts[0],...pts,pts[pts.length-1]];
  const out=[];
  for(let i=1;i<P.length-2;i++){
    const p0=P[i-1],p1=P[i],p2=P[i+1],p3=P[i+2];
    for(let s=0;s<step;s++){
      const t=s/step, t2=t*t, t3=t2*t;
      const cr=(a,b,c,d)=>0.5*((2*b)+(-a+c)*t+(2*a-5*b+4*c-d)*t2+(-a+3*b-3*c+d)*t3);
      out.push({ x:cr(p0.x,p1.x,p2.x,p3.x), y:cr(p0.y,p1.y,p2.y,p3.y), w:Math.max(1.5,cr(p0.w,p1.w,p2.w,p3.w)) });
    }
  }
  out.push(pts[pts.length-1]);
  return out;
}

// 由中心线 + 粗细 -> 闭合丝带多边形
function ribbonPath(dense){
  const top=[], bot=[];
  for(let i=0;i<dense.length;i++){
    const p=dense[i];
    const a=dense[Math.max(0,i-1)], b=dense[Math.min(dense.length-1,i+1)];
    let dx=b.x-a.x, dy=b.y-a.y; const len=Math.hypot(dx,dy)||1; dx/=len; dy/=len;
    const nx=-dy, ny=dx, h=p.w/2;
    top.push([p.x+nx*h, p.y+ny*h]);
    bot.push([p.x-nx*h, p.y-ny*h]);
  }
  let d="M"+top[0][0].toFixed(1)+","+top[0][1].toFixed(1);
  for(let i=1;i<top.length;i++) d+="L"+top[i][0].toFixed(1)+","+top[i][1].toFixed(1);
  for(let i=bot.length-1;i>=0;i--) d+="L"+bot[i][0].toFixed(1)+","+bot[i][1].toFixed(1);
  return d+"Z";
}
function centerPath(dense){
  let d="M"+dense[0].x.toFixed(1)+","+dense[0].y.toFixed(1);
  for(let i=1;i<dense.length;i++) d+="L"+dense[i].x.toFixed(1)+","+dense[i].y.toFixed(1);
  return d;
}

/* ============================================================
   4) 渲染
   ============================================================ */
const SVGNS="http://www.w3.org/2000/svg";
const svg=document.getElementById("svg");
const el=(n,a={})=>{const e=document.createElementNS(SVGNS,n);for(const k in a)e.setAttribute(k,a[k]);return e;};
let showMileLabels=true, showNight=true;
let contentH = 0;   // 由 loadData 在数据载入后按 THREADS 数量重算

let vp; // viewport group
function render(){
  svg.innerHTML="";
  const defs=el("defs"); svg.appendChild(defs);
  // 每线程一个横向渐变(用于淡出/发光)
  THREADS.forEach(th=>{
    const g=el("linearGradient",{id:"grad-"+th.id, x1:"0",x2:"1",y1:"0",y2:"0"});
    if(th.fade){
      g.appendChild(el("stop",{offset:"0", "stop-color":th.color, "stop-opacity":.95}));
      g.appendChild(el("stop",{offset:"0.72", "stop-color":th.color, "stop-opacity":.9}));
      g.appendChild(el("stop",{offset:"1", "stop-color":th.color, "stop-opacity":.06}));
    } else if(th.glow){
      g.appendChild(el("stop",{offset:"0", "stop-color":th.color, "stop-opacity":.78}));
      g.appendChild(el("stop",{offset:"1", "stop-color":"#ffd1e6", "stop-opacity":1}));
    } else {
      g.appendChild(el("stop",{offset:"0", "stop-color":th.color, "stop-opacity":.9}));
      g.appendChild(el("stop",{offset:"1", "stop-color":th.color, "stop-opacity":.85}));
    }
    defs.appendChild(g);
  });
  // 发光滤镜
  const f=el("filter",{id:"glow",x:"-30%",y:"-30%",width:"160%",height:"160%"});
  f.appendChild(el("feGaussianBlur",{stdDeviation:"3.2",result:"b"}));
  const fm=el("feMerge"); fm.appendChild(el("feMergeNode",{in:"b"})); fm.appendChild(el("feMergeNode",{in:"SourceGraphic"})); f.appendChild(fm);
  defs.appendChild(f);

  vp=el("g",{id:"vp"}); svg.appendChild(vp);

  // --- agent 分组背景带(squint:上下分区 = 哪个 agent) ---
  const gBands=el("g"); vp.appendChild(gBands);
  AGENTS.forEach(a=>{
    const r=agentLaneRange(a.id); if(!r) return;
    const y0=PAD_T + r.min*LANE_GAP - LANE_GAP*0.55;
    const y1=PAD_T + r.max*LANE_GAP + LANE_GAP*0.55;
    gBands.appendChild(el("rect",{x:0, y:y0, width:contentW, height:y1-y0, fill:a.hue, opacity:0.09, rx:8}));
    gBands.appendChild(el("rect",{x:0, y:y0, width:6, height:y1-y0, fill:a.hue, opacity:0.75, rx:3})); // 左缘色条
    const lab=el("text",{x:16, y:y0+16, fill:a.hue, "font-size":13, "font-weight":800, "fill-opacity":.95,
      style:"letter-spacing:.5px"});
    lab.textContent=a.name+" · "+a.role; gBands.appendChild(lab);
  });
  // 两带之间的分界线(交接连线跨过它 = 换乘)
  const rngs=AGENTS.map(a=>agentLaneRange(a.id)).filter(Boolean).sort((a,b)=>a.min-b.min);
  for(let i=1;i<rngs.length;i++){
    const yb=PAD_T + (rngs[i-1].max + rngs[i].min)/2*LANE_GAP;
    gBands.appendChild(el("line",{x1:0, y1:yb, x2:contentW, y2:yb, stroke:"var(--ink-faint)", "stroke-width":1.2, "stroke-dasharray":"3 5", "stroke-opacity":.6}));
  }

  // --- 夜间压缩带 ---
  const gNight=el("g"); vp.appendChild(gNight);
  if(showNight) nightSpans.forEach(ns=>{
    const x1=PAD_L+ns.from*PX_PER_COMP, x2=PAD_L+ns.to*PX_PER_COMP;
    gNight.appendChild(el("rect",{class:"nightband", x:x1, y:PAD_T-46, width:Math.max(2,x2-x1), height:contentH-PAD_T+30, rx:3}));
    const hrs=(ns.ms/3600000);
    const lab=el("text",{class:"nightlab", x:(x1+x2)/2, y:PAD_T-52, "text-anchor":"middle"});
    lab.textContent="🌙 "+(hrs>=1?hrs.toFixed(0)+"h":Math.round(ns.ms/60000)+"m");
    gNight.appendChild(lab);
  });

  // --- 日期 / 时间刻度(从数据自动派生,零硬编码)---
  const gAxis=el("g"); vp.appendChild(gAxis);
  const WK=["周日","周一","周二","周三","周四","周五","周六"];
  const p2=n=>String(n).padStart(2,"0");
  const t0=allT[0], t1=allT[allT.length-1];
  // 日期竖线:数据区间覆盖到的每个自然日(UTC)
  const daySet=new Set();
  for(let t=t0; t<=t1; t+=3600000){ const d=new Date(t); daySet.add(Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate())); }
  daySet.add(Date.UTC(new Date(t1).getUTCFullYear(),new Date(t1).getUTCMonth(),new Date(t1).getUTCDate()));
  [...daySet].sort((a,b)=>a-b).forEach(dms=>{
    const d=new Date(dms), x=tToX(Math.max(t0,dms));
    gAxis.appendChild(el("line",{class:"gridv", x1:x, y1:PAD_T-30, x2:x, y2:contentH-20}));
    const tx=el("text",{class:"daylab", x:x+8, y:contentH-6});
    tx.textContent=`${p2(d.getUTCMonth()+1)}-${p2(d.getUTCDate())} ${WK[d.getUTCDay()]}`; gAxis.appendChild(tx);
  });
  // 小时刻度:按跨度自适应步长(约 4–9 个刻度)
  const spanH=(t1-t0)/3600000;
  const stepH = spanH<=6?1 : spanH<=14?2 : spanH<=30?4 : spanH<=80?12 : 24;
  const stepMs=stepH*3600000;
  for(let t=Math.ceil(t0/stepMs)*stepMs; t<=t1; t+=stepMs){
    const x=tToX(t), d=new Date(t);
    const lab=el("text",{class:"axislab", x:x, y:PAD_T-30, "text-anchor":"middle"});
    lab.textContent=`${p2(d.getUTCHours())}:${p2(d.getUTCMinutes())}`; gAxis.appendChild(lab);
  }

  // --- 丝带(先存中心线供 marker 用) ---
  const gRib=el("g"); vp.appendChild(gRib);
  const gCen=el("g"); vp.appendChild(gCen);
  const centers={};
  THREADS.forEach(th=>{
    const cps=buildCenterline(th);
    const dense=sample(cps);
    centers[th.id]=cps;
    const rib=el("path",{class:"ribbon", id:"rib-"+th.id, d:ribbonPath(dense),
      fill:"url(#grad-"+th.id+")"});
    if(th.glow) rib.setAttribute("filter","url(#glow)");
    gRib.appendChild(rib);
    // 中心线:废弃线末段虚线
    const cen=el("path",{class:"center", d:centerPath(dense), stroke:th.color,
      "stroke-width":Math.max(1, .9), "stroke-opacity":th.fade?.35:.45});
    if(th.fade) cen.setAttribute("stroke-dasharray","1 7");
    gCen.appendChild(cen);
  });

  // --- handoff 换乘站:从交接源点 → 它催生的目标会话首事件点(跨 agent 分界带) ---
  const gHandoff=el("g"); vp.appendChild(gHandoff);
  EVENTS.filter(m=>m.handoff_to).forEach(m=>{
    if(!centers[m.thread]) return;
    const sx=tToX(T(m.ts)), sy=interpY(centers[m.thread], sx);
    const tEvs=EVENTS.filter(e=>e.session===m.handoff_to).sort((a,b)=>T(a.ts)-T(b.ts));
    if(!tEvs.length) return;
    const tgt=tEvs.find(e=>T(e.ts)>=T(m.ts)) || tEvs[0];
    const cps=centers[tgt.thread]; if(!cps) return;
    const txp=tToX(T(tgt.ts)), typ=interpY(cps, txp);
    const dx=Math.max(36,(txp-sx)*0.4);
    const d=`M${sx},${sy} C ${sx+dx},${sy} ${txp-dx},${typ} ${txp},${typ}`;
    const path=el("path",{class:"handoff", "data-a":m.thread, "data-b":tgt.thread, d, fill:"none",
      stroke:"var(--accent)", "stroke-width":2.2, "stroke-dasharray":"6 4", "stroke-opacity":.8,
      "stroke-linecap":"round"});
    gHandoff.appendChild(path);
    // 箭头(指入目标点)
    const ah=el("path",{d:`M${txp-8},${typ-5} L${txp},${typ} L${txp-8},${typ+5}`, fill:"none",
      stroke:"var(--accent)", "stroke-width":2.2, "stroke-opacity":.9, "stroke-linecap":"round","stroke-linejoin":"round"});
    gHandoff.appendChild(ah);
  });

  // --- 左侧泳道键(可拖动重排泳道) + 出生点小圆 ---
  const gLab=el("g"); vp.appendChild(gLab);
  THREADS.forEach(th=>{
    const y=laneY(th.id);
    const g=el("g",{class:"thlabel", "data-id":th.id, style:"cursor:grab"});
    g.appendChild(el("rect",{x:14, y:y-5, width:16, height:10, rx:3, fill:th.color}));
    const tn=el("text",{class:"lbl", x:38, y:y+1, "text-anchor":"start", "font-size":13, fill:th.color});
    tn.textContent=th.name; g.appendChild(tn);
    const ts=el("text",{class:"lbl-sub", x:38, y:y+14, "text-anchor":"start"});
    ts.textContent=th.sub; g.appendChild(ts);
    gLab.appendChild(g);
  });
  // 出生点:在丝带真实起点(分叉处)画小圆,而非孤立的泳道点
  THREADS.forEach(th=>{
    const c=centers[th.id][0];
    gLab.appendChild(el("circle",{cx:c.x, cy:c.y, r:4, fill:th.color, stroke:"var(--bg)", "stroke-width":1.5}));
  });

  // --- 里程碑 ---
  const gMk=el("g"); vp.appendChild(gMk);
  const seq={};
  MILES.forEach((m,i)=>{
    const th=TH[m.th]; const cps=centers[m.th];
    const x=tToX(T(m.t)); const y=interpY(cps, x);
    const g=el("g",{class:"mk","data-i":i, transform:`translate(${x},${y})`});
    g.appendChild(el("circle",{class:"hit", r:16}));
    drawMarker(g, m.type, th.color);
    if(showMileLabels){
      seq[m.th]=(seq[m.th]||0)+1; const k=seq[m.th];
      // 同一线程上的相邻里程碑上下错开,减少重叠
      const ly = (k%2===1) ? (-16 - (k%4===3?13:0)) : (25 + (k%4===0?13:0));
      const tl=el("text",{class:"lbl", x:0, y:ly, "text-anchor":"middle", "font-size":10.5, fill:"var(--ink)"});
      tl.textContent=m.lbl; g.appendChild(tl);
    }
    gMk.appendChild(g);
  });

  // --- NOW 标记(全局最新事件,动态定位在拥有它的线程上) ---
  const nowEv = EVENTS.slice().sort((a,b)=>T(b.ts)-T(a.ts))[0];
  const nowTh = (nowEv && TH[nowEv.thread]) ? nowEv.thread : THREADS[THREADS.length-1].id;
  const nowColor = TH[nowTh] ? TH[nowTh].color : "#fb7baf";
  const nowX=tToX(allT[allT.length-1]);
  const nowY=laneY(nowTh);
  const gNow=el("g"); vp.appendChild(gNow);
  gNow.appendChild(el("line",{x1:nowX, y1:PAD_T-30, x2:nowX, y2:contentH-20, stroke:nowColor, "stroke-width":1.5, "stroke-dasharray":"4 4", "stroke-opacity":.6}));
  const np=el("circle",{cx:nowX, cy:nowY, r:7, fill:nowColor, filter:"url(#glow)"});
  gNow.appendChild(np);
  const pulse=el("circle",{cx:nowX, cy:nowY, r:7, fill:"none", stroke:nowColor,"stroke-width":2});
  const an=el("animate",{attributeName:"r",values:"7;20;7",dur:"2.4s",repeatCount:"indefinite"});
  const an2=el("animate",{attributeName:"stroke-opacity",values:".9;0;.9",dur:"2.4s",repeatCount:"indefinite"});
  pulse.appendChild(an); pulse.appendChild(an2); gNow.appendChild(pulse);
  const nl=el("text",{class:"lbl", x:nowX, y:PAD_T-36, "text-anchor":"middle", "font-size":12, fill:nowColor});
  nl.textContent="NOW ▸"; gNow.appendChild(nl);

  applyTransform();
  wireMarkers(); wireLabelDrag();
}

function interpY(cps, x){
  for(let i=1;i<cps.length;i++){
    if(x<=cps[i].x){ const a=cps[i-1],b=cps[i]; const f=(x-a.x)/((b.x-a.x)||1); return a.y+f*(b.y-a.y); }
  }
  return cps[cps.length-1].y;
}

// 里程碑形状
function drawMarker(g, type, color){
  const dark="var(--bg)";
  const add=(n,a)=>g.appendChild(el(n,a));
  switch(type){
    case "decision": // ◆
      add("path",{d:"M0,-7 L7,0 L0,7 L-7,0 Z", fill:color, stroke:dark, "stroke-width":2}); break;
    case "pivot": { // ✱ 星爆
      const star=el("path",{d:starPath(8,3.4,6), fill:color, stroke:dark,"stroke-width":1.6});
      add("circle",{r:11, fill:color, "fill-opacity":.14});
      g.appendChild(star); break; }
    case "abandon": // ✕
      add("circle",{r:8, fill:dark, stroke:color, "stroke-width":1.6, "stroke-opacity":.6});
      add("path",{d:"M-3.4,-3.4 L3.4,3.4 M3.4,-3.4 L-3.4,3.4", stroke:color, "stroke-width":2, "stroke-linecap":"round", "stroke-opacity":.85}); break;
    case "artifact": // ▭ 文件
      add("rect",{x:-6.5,y:-6.5,width:13,height:13,rx:3, fill:color, stroke:dark,"stroke-width":2});
      add("path",{d:"M-3,-2 H3 M-3,1 H3 M-3,4 H1", stroke:dark, "stroke-width":1.3, "stroke-opacity":.7}); break;
    case "finding": // ●
      add("circle",{r:6.5, fill:color, stroke:dark, "stroke-width":2});
      add("circle",{r:2.4, fill:dark, "fill-opacity":.5}); break;
    case "question": // ?
      add("circle",{r:8, fill:dark, stroke:color, "stroke-width":2});
      { const q=el("text",{x:0,y:3.5,"text-anchor":"middle","font-size":10,"font-weight":700,fill:color}); q.textContent="?"; g.appendChild(q);} break;
    case "verify": // ✔
      add("circle",{r:8, fill:color});
      add("path",{d:"M-3.4,0 L-1,2.6 L3.6,-2.8", fill:"none", stroke:dark, "stroke-width":2.1, "stroke-linecap":"round","stroke-linejoin":"round"}); break;
    case "handoff": // ➜
      add("circle",{r:8, fill:dark, stroke:color,"stroke-width":1.6});
      add("path",{d:"M-3.5,0 H3 M0.5,-2.6 L3.6,0 L0.5,2.6", fill:"none", stroke:color, "stroke-width":1.8,"stroke-linecap":"round","stroke-linejoin":"round"}); break;
    case "interrupt": // ▲
      add("path",{d:"M0,-7.5 L7,6 L-7,6 Z", fill:color, stroke:dark,"stroke-width":1.6});
      { const q=el("text",{x:0,y:5,"text-anchor":"middle","font-size":9,"font-weight":800,fill:dark}); q.textContent="!"; g.appendChild(q);} break;
    default:
      add("circle",{r:6, fill:color, stroke:dark,"stroke-width":2});
  }
}
function starPath(spikes,inner,outer){
  let d=""; const step=Math.PI/spikes;
  for(let i=0;i<2*spikes;i++){
    const r=i%2?inner:outer, a=i*step-Math.PI/2;
    d+=(i?"L":"M")+(Math.cos(a)*r).toFixed(2)+","+(Math.sin(a)*r).toFixed(2);
  }
  return d+"Z";
}

/* ============================================================
   5) 交互:平移/缩放
   ============================================================ */
let tx=0, ty=0, scale=1;
function applyTransform(){ if(vp) vp.setAttribute("transform",`translate(${tx},${ty}) scale(${scale})`); }
function fitView(){
  // 适配到不被侧栏遮挡的中央区域
  const W=svg.clientWidth, H=svg.clientHeight;
  const insetL=20, insetR=(W>980?270:20), insetT=(W>980?150:120), insetB=80;
  const rw=Math.max(200, W-insetL-insetR), rh=Math.max(160, H-insetT-insetB);
  scale=Math.min(rw/contentW, rh/contentH, 1.1);
  scale=Math.max(scale,0.18);
  tx=insetL+(rw-contentW*scale)/2;
  ty=insetT+(rh-contentH*scale)/2;
  applyTransform();
}
const stage=document.getElementById("stage");
let panning=false, sx,sy,stx,sty, draggingLabel=null;
stage.addEventListener("mousedown",e=>{
  if(draggingLabel) return;
  panning=true; stage.classList.add("panning"); sx=e.clientX; sy=e.clientY; stx=tx; sty=ty;
});
window.addEventListener("mousemove",e=>{
  if(panning){ tx=stx+(e.clientX-sx); ty=sty+(e.clientY-sy); applyTransform(); }
});
window.addEventListener("mouseup",()=>{ panning=false; stage.classList.remove("panning"); });
stage.addEventListener("wheel",e=>{
  e.preventDefault();
  const r=svg.getBoundingClientRect(); const mx=e.clientX-r.left, my=e.clientY-r.top;
  const k=e.deltaY<0?1.12:1/1.12; const ns=Math.min(3,Math.max(0.18,scale*k));
  const wx=(mx-tx)/scale, wy=(my-ty)/scale;
  scale=ns; tx=mx-wx*scale; ty=my-wy*scale; applyTransform();
},{passive:false});

function fmtTime(t){ const d=new Date(t); const p=n=>String(n).padStart(2,"0");

function wireLabelDrag(){
  svg.querySelectorAll(".thlabel").forEach(g=>{
    g.addEventListener("mousedown",e=>{
      e.stopPropagation(); draggingLabel={id:g.dataset.id, startY:e.clientY};
      g.style.cursor="grabbing";
    });
  });
}
window.addEventListener("mousemove",e=>{
  if(!draggingLabel) return;
  const dy=(e.clientY-draggingLabel.startY)/scale;
  const idx=order.indexOf(draggingLabel.id);
  // 钳制在本 agent 泳道组内(保持上下分区不被打乱)
  const ag=TH[draggingLabel.id] && TH[draggingLabel.id].agent;
  const r=agentLaneRange(ag) || {min:0,max:order.length-1};
  let newIdx=Math.round((laneY(draggingLabel.id)+dy-PAD_T)/LANE_GAP);
  newIdx=Math.max(r.min, Math.min(r.max, newIdx));
  if(newIdx!==idx){
    order.splice(idx,1); order.splice(newIdx,0,draggingLabel.id);
    draggingLabel.startY=e.clientY; render();
  }
});

/* ---- coverage / 可信度 chip(完整性 = 数据层,用户可见可审计) ---- */
function buildCoverageChip(){
  const btn=document.getElementById("bCoverage"), panel=document.getElementById("covPanel");
  if(!COVERAGE || !COVERAGE.sessions){ if(btn) btn.style.display="none"; return; }
  const S=Object.values(COVERAGE.sessions);
  let turns=0,ext=0,mer=0,ski=0;
  S.forEach(x=>{ turns+=x.turns; ext+=x.extracted; mer+=x.merged; ski+=x.skipped; });
  const gu=(COVERAGE.totals&&COVERAGE.totals.genuineUncovered)||0;
  const ok = gu===0;
  btn.querySelector(".cov-dot").style.color = ok? "var(--ok)" : "var(--warn)";
  btn.querySelector(".cov-dot").style.background = ok? "var(--ok)" : "var(--warn)";
  btn.lastChild.textContent = ` 覆盖 ${ext+mer}/${turns} · 跳过 ${ski}`;
  // reason breakdown
  const reasons={};
  S.forEach(x=>(x.ledger||[]).forEach(e=>{ if(e.status==="skipped") reasons[e.reason]=(reasons[e.reason]||0)+1; }));
  const RL={empty:"空内容", "task-notif":"系统通知", "re-send":"重发", "terse-ack":"极短/过程指令",
            "out-of-snapshot":"快照后·待蒸馏", "agent-report":"他方汇报·已核对"};
  let h=`<div class="cov-h">完整性 · 数据层</div>`;
  h+=`<div class="cov-trust ${ok?'ok':'warn'}">${ok?'✅ 0 个 genuine turn 丢失 · 审计门禁通过':'⚠️ '+gu+' 个未解释缺口'}</div>`;
  h+=`<div class="cov-line"><b>${turns}</b> 条用户 turn 全部留账:<b>${ext}</b> 抽取为事件 · <b>${mer}</b> 折叠并入 · <b>${ski}</b> 显式跳过</div>`;
  h+=`<div class="cov-sub">跳过分类(每条都有正当理由,不再是"不够重要"):</div><div class="cov-reasons">`;
  Object.entries(reasons).sort((a,b)=>b[1]-a[1]).forEach(([r,n])=> h+=`<span class="cov-tag">${RL[r]||r} · ${n}</span>`);
  h+=`</div><div class="cov-note">完整性是<b>数据层</b>保证(每条 turn 的 provenance 都在,可点回源)。视图层仍可折叠/聚类次要 turn —— 那是<b>渲染选择</b>,不是静默丢弃。</div>`;
  panel.innerHTML=h;
  btn.onclick=(e)=>{ e.stopPropagation(); panel.classList.toggle("show"); };
}
document.addEventListener("click",e=>{ const p=document.getElementById("covPanel");
  if(p && !p.contains(e.target) && e.target.id!=="bCoverage") p.classList.remove("show"); });

const cleanProj = s => s.replace(/^C--/,"").replace(/--/g," · ").replace(/-/g," ").trim();

  const groups={}; files.forEach(f=>{ (groups[f.project]||=[]).push(f); });
  const keys=Object.keys(groups).sort();
  const esc=s=>String(s).replace(/"/g,"&quot;");
  const grpHtml=keys.map(proj=>{
    const fs=groups[proj].sort((a,b)=>b.mtime-a.mtime);

      `<span class="imp-sname" title="${esc(f.path)}">${f.name.slice(0,8)}…</span><span class="imp-fmeta">${f.sizeMB}MB</span></label>`).join("");
    return `<div class="imp-grp">`+
      `<div class="imp-folder"><input type="checkbox" class="imp-fcheck"><span class="caret">▶</span>`+
      `<span class="imp-fname">${cleanProj(proj)}</span><span class="imp-fmeta">${fs.length} 会话 · ${mb}MB</span></div>`+
      `<div class="imp-sessions">${sess}</div></div>`;

  p.innerHTML=`<h3>导入对话</h3><div class="imp-sub">${data.root} · ${keys.length} 个项目 / ${files.length} 会话(以文件夹为单位勾选,点项目名展开)</div>`+
    `<div id="impList">${grpHtml||"<div class='imp-sub'>无 .jsonl</div>"}</div>`+
    `<div class="imp-act"><label><input type="checkbox" id="impAdd" checked>加入当前视图(取消=只看选中的)</label>`+
    `<span style="flex:1"></span><button class="imp-go" id="impGo">蒸馏并导入 <span id="impN"></span></button></div>`+

  const updN=()=>{ const n=p.querySelectorAll(".imp-sess:checked").length; document.getElementById("impN").textContent=n?`(${n})`:""; };

      fr.classList.toggle("open"); fr.nextElementSibling.classList.toggle("open"); });
  });
  // 文件夹复选框 = 选中该文件夹全部会话
  p.querySelectorAll(".imp-fcheck").forEach(fc=>{
    fc.addEventListener("change",()=>{ fc.closest(".imp-grp").querySelectorAll(".imp-sess").forEach(s=>{ s.checked=fc.checked; }); updN(); });
  });
  // 单个会话复选框 → 回写文件夹复选框(全选/半选/无)
  p.querySelectorAll(".imp-sess").forEach(s=>{
    s.addEventListener("change",()=>{ const g=s.closest(".imp-grp"); const all=[...g.querySelectorAll(".imp-sess")];
      const on=all.filter(x=>x.checked).length; const fc=g.querySelector(".imp-fcheck");
      fc.checked=on===all.length; fc.indeterminate=on>0&&on<all.length; updN(); });
  });
  document.getElementById("impGo").onclick=async function(){
    const picked=[...p.querySelectorAll(".imp-sess:checked")].map(c=>c.dataset.path);
    if(!picked.length){ document.getElementById("impStatus").textContent="先勾选至少一个项目或会话。"; return; }
    const mode=document.getElementById("impAdd").checked?"add":"replace";
    this.disabled=true; const st=document.getElementById("impStatus");
    st.textContent=`蒸馏中…(每条 genuine turn 一次小调用,大会话约数十秒;只蒸馏新增,不重跑全部)`;
    try{
      const r=await fetch("/distill",{method:"POST",headers:{"content-type":"application/json"},
        body:JSON.stringify({paths:picked,mode})}).then(x=>x.json());
      if(r.error){ st.innerHTML=`<span style="color:var(--warn)">失败:${r.error}</span>`+(r.audit?`<br><span style="opacity:.6">${r.audit.replace(/</g,"&lt;").slice(-300)}</span>`:""); this.disabled=false; return; }
      st.innerHTML=`<span style="color:var(--ok)">✓ 已导入 · 现 ${r.events} 事件 / ${r.sessions} 会话</span>`;
      liveSig="";                       // 强制下次 poll 视为变化
      await pollLive();                 // 立即重载渲染
      setTimeout(()=>p.classList.remove("show"),900);
    }catch(e){ st.innerHTML=`<span style="color:var(--warn)">请求失败:${e.message}</span>`; this.disabled=false; }
  };
}
document.getElementById("bImport").onclick=(e)=>{ e.stopPropagation(); openImport(); };

/* ---- 手动重新蒸馏 + 更新画布(对当前 manifest 的会话重跑 DeepSeek 蒸馏 → audit → reload) ---- */
document.getElementById("bRedistill").onclick=async function(){
  if(this.classList.contains("busy")) return;
  this.classList.add("busy","on"); const orig=this.lastChild.textContent;
  this.lastChild.textContent="蒸馏中…";
  const t=document.getElementById("toast"); t.textContent="▸ 重新蒸馏中(调用模型,约数十秒)…"; t.classList.add("show");
  try{
    const r=await fetch("/redistill",{method:"POST"}).then(x=>x.json());
    if(r.error){ const t=document.getElementById("toast"); t.textContent="重蒸失败:"+r.error; setTimeout(()=>t.classList.remove("show"),3000); }
    else { liveSig=""; await pollLive(); const t=document.getElementById("toast");
      t.textContent=`▸ 重新蒸馏完成 · ${r.events} 事件 / ${r.sessions} 会话`; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2200); }
  }catch(e){ const t=document.getElementById("toast"); t.textContent="请求失败:"+e.message; setTimeout(()=>t.classList.remove("show"),3000); }
  this.classList.remove("busy","on"); this.lastChild.textContent=orig;
};

loadData();
