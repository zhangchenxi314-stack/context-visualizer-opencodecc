<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0c10"/>
      <stop offset="1" stop-color="#12141c"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8BA3FF"/>
      <stop offset="0.55" stop-color="#55C6B1"/>
      <stop offset="1" stop-color="#E2B357"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.2" r="0.8">
      <stop offset="0" stop-color="#3a58c9" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#3a58c9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.7" r="0.7">
      <stop offset="0" stop-color="#1f7d72" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#1f7d72" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EC8FB0" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#EC8FB0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#glow1)"/>
  <rect width="1200" height="400" fill="url(#glow2)"/>

  <!-- storyline ribbons -->
  <g fill="none" stroke-linecap="round">
    <!-- band A: main blue thread, thick -> thin -->
    <path d="M60,120 C260,120 380,118 560,116 S900,150 1140,150" stroke="#8BA3FF" stroke-width="14" opacity="0.9"/>
    <!-- branch off the blue thread -->
    <path d="M560,116 C620,120 660,150 720,175 S860,196 1000,196" stroke="#7C6FF0" stroke-width="7" opacity="0.85"/>
    <!-- band B: gold thread lower -->
    <path d="M60,272 C300,272 460,270 640,268 S980,250 1140,248" stroke="#E2B357" stroke-width="16" opacity="0.9"/>
    <!-- abandoned pink thread, fading + dashed tail -->
    <path d="M640,268 C720,272 780,300 880,308" stroke="url(#fade)" stroke-width="8"/>
    <path d="M880,308 C960,314 1020,316 1090,316" stroke="#EC8FB0" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="1 8"/>
    <!-- handoff: dashed cross-band line from blue -> gold -->
    <path d="M470,116 C470,190 470,200 470,266" stroke="#aeb6c8" stroke-width="1.6" stroke-dasharray="5 4" opacity="0.55"/>
  </g>

  <!-- milestone dots -->
  <g>
    <circle cx="150" cy="120" r="5" fill="#0b0c10" stroke="#8BA3FF" stroke-width="2.4"/>
    <rect x="303" y="111" width="10" height="10" rx="2" fill="#8BA3FF"/>
    <circle cx="470" cy="116" r="6" fill="#8BA3FF"/>
    <circle cx="720" cy="175" r="4.5" fill="#7C6FF0"/>
    <path d="M150,272 m-6,0 a6,6 0 1,0 12,0 a6,6 0 1,0 -12,0" fill="#E2B357"/>
    <rect x="437" y="263" width="10" height="10" rx="2" fill="#E2B357"/>
    <path d="M760,300 l6,-10 l6,10 z" fill="#EC8FB0"/>
  </g>

  <!-- text -->
  <text x="60" y="70" font-size="42" font-weight="800" fill="url(#ttl)" letter-spacing="-0.5">Context Visualizer</text>
  <text x="62" y="358" font-size="19" font-weight="600" fill="#c7cddb">长 / 多 agent 对话 → 可信 storyline 时间线</text>
  <text x="62" y="384" font-size="14.5" fill="#7b8494">local&#160;·&#160;private&#160;·&#160;zero-dependency&#160;·&#160;open-source</text>

  <!-- squint labels (right) -->
  <g font-size="12.5" fill="#6b7484" text-anchor="end">
    <text x="1150" y="96">thickness = activity</text>
    <text x="1150" y="188">branch = new thread</text>
    <text x="1150" y="330">fade = abandoned</text>
  </g>
</svg>
